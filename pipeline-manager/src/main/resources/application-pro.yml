spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:5432/pipeline
    username: pipeline
    password: ${DB_PASSWORD}
  redis:
    host: ${REDIS_HOST:redis}
    port: 6379
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: 5672
    username: ${RABBITMQ_USER:pipeline}
    password: ${RABBITMQ_PASSWORD}

logging:
  level:
    com.pipeline: INFO

xxl:
  job:
    enabled: true
    admin:
      addresses: ${XXL_JOB_ADMIN:http://xxl-job-admin:18080/xxl-job-admin}
    executor:
      appname: pipeline-admin-pro
      logpath: /data/logs/xxl-job